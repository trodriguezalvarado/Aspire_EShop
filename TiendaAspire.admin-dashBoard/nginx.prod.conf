server {
    listen 80;
    server_name localhost; # En el servidor será tu IP o Dominio

    # 1. TIENDA WEB (Blazor) - En la raíz
    location / {
        proxy_pass http://tienda-web:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. DASHBOARD (Angular) - En /admin/
    location /admin/ {
        proxy_pass http://admin-dashboard:80/admin/; # La barra final es clave
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. APIS - Bajo el prefijo /api/
    location /api/inventario/ {
        proxy_pass http://inventario-api:80/;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Host $host;
    }

    location /api/catalogo/ {
        proxy_pass http://catalogo-api:80/;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Host $host;
    }

    # 4. KEYCLOAK - Bajo /auth/ (Opcional, pero recomendado)
    location /auth/ {
        proxy_pass http://keycloak:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
