server {
    listen 80;
    server_name tutienda.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tutienda.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/tutienda.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tutienda.duckdns.org/privkey.pem;

    # Basic store (Blazor)
    location / {
        proxy_pass http://tienda-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Dashboard (Angular)
    location /admin/ {
        proxy_pass http://admin-dashboard:80;
        proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;

    	# Important: Ensure Nginx doesn't cache the HTML when it should be JS
    	proxy_cache_bypass $http_upgrade;
    }

    # Keycloak (IMPORTANT: Now through the Gateway)
    location /auth {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;
    	proxy_set_header X-Forwarded-Host $host;
    	proxy_set_header X-Forwarded-Port 443;
	proxy_set_header X-Forwarded-Prefix /auth;	
	proxy_redirect off;
    
    	# This is vital for Keycloak cookies and redirects
    	proxy_buffer_size   128k;
    	proxy_buffers       4 256k;
    	proxy_busy_buffers_size 256k;
    }

    location /api/inventario/ {
        proxy_pass http://inventario-api:80/; 
    	proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/catalogo/ {
        proxy_pass http://catalogo-api:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

	
