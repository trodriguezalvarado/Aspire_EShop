<div style="padding: 20px; font-family: sans-serif;">
  <h1>Dashboard de Administración</h1>
  <h3>Productos Pendientes de Precio</h3>

  <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th style="padding: 10px;">Nombre</th>
        <th style="padding: 10px;">Stock</th>
        <th style="padding: 10px;">Precio de Venta</th>
        <th style="padding: 10px;">Acción</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let prod of productos">
        <td style="padding: 10px;">{{ prod.nombre }}</td>
        <td style="padding: 10px;">{{ prod.existencias }}</td>
        <td style="padding: 10px;">
          <input type="number" [(ngModel)]="prod.precio" placeholder="0.00">
        </td>
        <td style="padding: 10px;">
          <button (click)="publicar(prod)">Publicar en Catálogo</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="productos.length === 0" style="margin-top: 20px;">
    <p>No hay productos esperando asignación de precio.</p>
  </div>
</div>
