server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=30s;

    location / {
        return 301 /admin/;
    }

    location /admin/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location /auth/ {
        # The trailing slash is vital here too
        proxy_pass http://keycloak:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Sin barra al final de 'inventario' para que coincida con lo que manda Angular
    location /api/inventario/ {
        proxy_pass http://inventario-api:80/; 
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/catalogo/ {
        proxy_pass http://catalogo-api:80/; 
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
